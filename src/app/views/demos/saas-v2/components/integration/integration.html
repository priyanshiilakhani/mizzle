<section class="lg:pb-28 md:pb-16 pb-10">
    <div class="container">
        <div class="max-w-2xl mx-auto text-center mb-8 md:mb-16">
            <span class="text-primary font-bold uppercase tracking-wide">Integrations</span>
            <h2 class="text-3xl md:text-4xl lg:text-[45px] font-bold mt-4 mb-6">Seamless integration for maximum efficiency</h2>
            <p>Discover how effortless integration with our platform can supercharge your agency's workflow. Achieve new levels of efficiency and collaboration with these simple steps.</p>
        </div>

        <div class="max-w-5xl mx-auto">
            <div class="grid grid-cols-4 md:grid-cols-6 gap-6 md:gap-14 justify-center items-center md:mb-14 mb-6">
                @for(item of integrations;track $index){
                <div class="text-center">
                    <img [src]="item" class="h-8 md:h-12 lg:h-14 mx-auto" alt="Integration-img" />
                </div>
                }
            </div>
        </div>
    </div>
</section>
