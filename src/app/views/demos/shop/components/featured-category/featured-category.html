<section class="lg:py-28 md:py-20 py-16">
    <div class="container">
        <div class="md:flex justify-between items-center mb-6">
            <h2 class="lg:text-4xl md:text-3xl text-2xl font-bold mb-2">Featured category</h2>
            <a [routerLink]="[]" class="group flex items-center gap-1 hover:text-primary transition-all">
                View all
                <lucide-icon name="arrow-right" class="size-4 group-hover:translate-x-1 transition-all"></lucide-icon>
            </a>
        </div>

        <div class="swiper">
            <swiper-container class="mb-12" space-between="30" grab-cursor="true" pagination-el=".swiper-pagination" breakpoints='{
    "576": { "slidesPerView": 3 },
    "768": { "slidesPerView": 4 },
    "992": { "slidesPerView": 5 },
    "1200": { "slidesPerView": 6 }
  }'>
                @for(item of categoryData;track $index){
                <swiper-slide>
                    <div class="border border-default-200 hover:border-primary p-6 bg-transparent text-center rounded-lg relative group transition-all">
                        <a [routerLink]="[]" class="absolute inset-0 z-0"></a>

                        <figure class="text-center mb-4" [innerHTML]="item.safeIcon">
                        </figure>

                        <h6 class="text-xl font-bold group-hover:text-primary transition-colors">{{item.title}}</h6>
                    </div>
                </swiper-slide>
                }
            </swiper-container>
            <div class="swiper-pagination swiper-pagination-primary lg:hidden block"></div>
        </div>
    </div>
</section>
