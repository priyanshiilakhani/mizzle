<section class="lg:pb-28 md:pb-20 pb-16">
    <div class="container">
        <div class="md:flex justify-between items-center mb-10">
            <h2 class="lg:text-[45px] md:text-4xl text-3xl font-bold lg:w-xl md:w-sm">Take a look at the latest articles & blogs</h2>
            <div class="md:mt-0 mt-6">
                <a routerLink="/blog/grid" class="bg-default-100 hover:bg-default-200 py-3 px-6 text-black rounded transition-all">View all blogs</a>
            </div>
        </div>

        <div class="grid md:grid-cols-3 grid-cols-1 gap-6">
            @for(item of blogData;track $index){
            <article class="bg-body-bg shadow-md rounded-lg overflow-hidden h-full group relative">
                <div class="overflow-hidden">
                    <img [src]="item.image" alt="Blog image" class="w-full h-auto transform transition-transform duration-500 group-hover:scale-104" />
                </div>

                <div class="p-6">
                    <h6 class="text-lg font-semibold mb-6">
                        <a [routerLink]="item.url" class="text-xl text-default-900 group-hover:text-primary transition-colors duration-500 after:absolute after:inset-0">{{item.title}}</a>
                    </h6>

                    <ul class="lg:flex md:block flex items-center gap-2 text-sm text-default-800 font-normal">
                        <li class="me-3">By {{item.author}}</li>
                        <li class="relative after:content-[''] after:absolute after:size-1 after:bg-default-700 after:rounded-full after:top-1/2 after:-translate-y-1/2 after:-start-2 lg:block md:hidden block"></li>
                        <li class="flex items-center gap-2 lg:mt-0 md:mt-1 mt-0">
                            <lucide-icon name="calendar" class="size-4"></lucide-icon>
                            {{item.date}}
                        </li>
                    </ul>
                </div>
            </article>
            }
        </div>
    </div>
</section>
