        <div class="grid lg:grid-cols-2 grid-cols-1 lg:gap-0 gap-y-10">
            <div class="lg:order-1 order-2">
                <div class="bg-primary/10 rounded-md relative p-10 lg:w-xl md:w-2xl">
                    <figure class="absolute -top-10 -start-14">
                        <svg class="fill-default-800" width="156" height="153" viewBox="0 0 156 153" fill="none" xmlns="http://www.w3.org/2000/svg">

                        </svg>
                    </figure>

                    <div id="feature-01" role="tabpanel" aria-labelledby="feature-01-tab">
                        <div>
                            <img src="/images/elements/saas-decoration/10.png" class="my-8" alt="decoration" />
                        </div>
                    </div>

                    <div id="feature-02" class="hidden" role="tabpanel" aria-labelledby="feature-02-tab">
                        <div>
                            <img src="/images/elements/saas-decoration/12.png" class="my-8" alt="decoration" />
                        </div>
                    </div>

                    <div id="feature-03" class="hidden" role="tabpanel" aria-labelledby="feature-03-tab">
                        <div>
                            <img src="/images/elements/saas-decoration/11.png" class="my-8" alt="decoration" />
                        </div>
                    </div>
                </div>
            </div>

            <div class="lg:order-2 order-1">
                <h2 class="lg:text-[45px] md:text-4xl text-3xl mb-6">Transform your business with our powerful solutions</h2>
                <p class="mb-6">Comfort reached gay perhaps chamber his six detract besides add. Moonlight newspaper up its enjoyment.</p>

                <div>
                    <nav class="flex flex-col space-y-4" aria-label="Tabs" role="tablist" aria-orientation="vertical">
                        @for (item of features; track $index; let i = $index) {
                        <button type="button" class="hs-tab-active:border-s-3 hs-tab-active:border-primary hs-tab-active:bg-default-100 md:p-6 p-4 flex items-center gap-x-4 rounded-xs" [class.active]="i === 0" [id]="item.id + '-tab'" [attr.aria-selected]="i === 0 ? 'true' : 'false'" [attr.data-hs-tab]="'#' + item.id" [attr.aria-controls]="item.id" role="tab">
                            <div>
                                <div class="size-14 rounded-md bg-body-bg border border-default-200 flex items-center justify-center text-xl text-default-700 font-semibold">
                                    <lucide-icon [name]="item.icon" class="size-5"></lucide-icon>
                                </div>
                            </div>

                            <div class="text-start">
                                <h6 class="text-xl mb-2 font-bold"> {{ item.title }}</h6>
                                <p class="font-medium">  {{ item.description }}</p>
                            </div>
                        </button>
                        }
                    </nav>
                </div>

                <p class="flex items-center gap-1.5 mt-4">
                    <span class="flex items-center gap-1">
                        <lucide-icon name="info" class="size-5 fill-default-800 text-default-50"></lucide-icon>
                        Contact our team for more information
                    </span>

                    <a routerLink="/contact/v1" class="group text-primary hover:text-primary-hover flex items-center gap-1 underline">
                        Let's chat <lucide-icon name="arrow-right" class="size-4 group-hover:translate-x-1 transition-all"></lucide-icon>
                    </a>
                </p>
            </div>
        </div>
    </div>
</section>
