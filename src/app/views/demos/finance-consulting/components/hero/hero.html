<section class="relative pt-20 lg:pt-32 pb-0">
        <div class="absolute top-12 start-1/2 -translate-x-1/2">
            <img src="assets/images/elements/bg-pattern-5.png" />
        </div>

        <div class="relative container pt-10">
            <div class="grid grid-cols-1 text-center">
                <div class="lg:col-span-8 max-w-3xl lg:mx-auto">
                    <span class="text-default-800 font-semibold">Trusted by happy customers</span>

                    <!-- Avatar group -->
                    <ul class="flex items-center justify-center -space-x-3.5 lg:mt-3 mt-2">
                        <li><img src="assets/images/avatar/06.jpg" alt="avatar" class="size-9 rounded-full" /></li>
                        <li><img src="assets/images/avatar/05.jpg" alt="avatar" class="size-9 rounded-full" /></li>
                        <li><img src="assets/images/avatar/02.jpg" alt="avatar" class="size-9 rounded-full" /></li>
                        <li><img src="assets/images/avatar/03.jpg" alt="avatar" class="size-9 rounded-full" /></li>
                        <li><img src="assets/images/avatar/04.jpg" alt="avatar" class="size-9 rounded-full" /></li>
                    </ul>

                    <h1 class="my-6 text-[34px] md:text-[45px] lg:text-[58px] font-bold leading-tight">
                        Empower your
                        <span class="text-primary">finances</span>
                        for a brighter tomorrow
                    </h1>

                    <p class="mb-10">Whether you're planning for retirement, investing in your future, or seeking expert advice, our team is here to provide tailored solutions to meet your unique needs.</p>

                    <div class="flex flex-wrap justify-center gap-x-4 gap-y-2.5">
                        <a [routerLink]="[]" class="inline-flex items-center justify-center gap-2 bg-primary text-white font-medium px-6 py-3 rounded-md hover:bg-primary-hover transition-all">
                            <lucide-icon name="phone" class="fill-white text-white size-4"></lucide-icon>
                            Book a call
                        </a>

                        <button type="button" class="text-default-800 border border-default-300 bg-body-bg font-medium px-6 py-3 rounded-md hover:bg-default-200 hover:border-default-200 transition">Start Your Journey</button>
                    </div>
                </div>

                <div class="col-span-12 mt-14 lg:mt-32">
                    <img src="assets/images/bg/11.jpg" class="rounded-md w-full" />
                </div>
            </div>
        </div>
    </section>
