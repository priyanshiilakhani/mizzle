<section class="lg:py-28 md:py-20 py-16">
        <div class="container">
            <div class="text-center md:mb-14 mb-6">
                <h2 class="lg:text-[45px] md:text-4xl text-3xl">Our news & articles</h2>
            </div>

            <div class="grid md:grid-cols-2 md:gap-10 gap-6 grid-cols-1">
                @for( item of blogData;track $index ){
                   <div>
                    <article class="bg-transparent group">
                        <img [src]="item.image" alt="blog-image" class="w-full rounded-md object-cover mb-4" />
                        <div>
                            <h6 class="text-xl font-bold mb-2">{{ item.title }}</h6>

                            <div class="flex justify-between items-center">
                                <p>By {{ item.author }}</p>
                                <a [routerLink]="item.link" class="inline-flex items-center gap-1 text-primary group-hover:text-primary-hover transition">
                                    Read more
                                    <lucide-icon name="arrow-right" class="size-4 group-hover:translate-x-1 transition-all duration-300"></lucide-icon>
                                </a>
                            </div>
                        </div>
                    </article>
                </div>
                }

            </div>
        </div>
    </section>
