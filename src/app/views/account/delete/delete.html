 <section class="lg:py-28 py-18">
        <div class="container">
            <div class="grid lg:grid-cols-4 grid-cols-1 gap-4">
                <div>
                    <app-account-sidebar />
                </div>

                <div class="lg:col-span-3 lg:ps-14">
                    <div class="flex justify-between items-center mb-14">
                        <h1 class="lg:text-4xl md:text-3xl text-2xl">Delete profile</h1>
                        <div class="lg:hidden flex items-center gap-2 text-start">
                            <button type="button" class="flex items-center gap-2 py-2 px-4 bg-primary hover:bg-primary-hover text-white rounded font-medium w-full" aria-haspopup="dialog" aria-expanded="false" aria-controls="offcanvasSidebar" aria-label="Toggle navigation" data-hs-overlay="#offcanvasSidebar">
                                <lucide-icon name="sliders-horizontal" class="size-4"></lucide-icon>
                                Menu
                            </button>
                        </div>
                    </div>

                    <div class="flex justify-between items-center pb-4 border-b border-default-200">
                        <h6 class="text-xl">Deactivate Account</h6>
                    </div>

                    <div class="py-5">
                        <span class="font-bold text-default-800">Before you go...</span>
                        <ul class="mt-2 list-disc list-inside">
                            <li>
                                Take a backup of your data
                                <a [routerLink]="[]" class="text-primary hover:text-primary-hover transition-all">Here</a>
                            </li>

                            <li>If you delete your account, you will lose your all data.</li>
                        </ul>

                        <div class="flex items-center gap-2 my-6">
                            <input class="size-4 border-0 bg-default-200! checked:bg-primary! rounded" type="checkbox" value="" id="deleteaccountCheck" />
                            <label class="form-check-label" for="deleteaccountCheck">Yes, I'd like to delete my account</label>
                        </div>

                        <div class="flex flex-wrap items-center md:gap-1 gap-5">
                            <div>
                                <a [routerLink]="[]" class="py-2 px-4 text-primary bg-primary/15 hover:bg-primary hover:text-white rounded font-medium transition-all">Keep my account</a>
                            </div>

                            <div>
                                <a [routerLink]="[]" class="py-2 px-4 text-white bg-danger-hover hover:bg-danger hover:text-white rounded font-medium transition-all">Delete my account</a>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </section>
