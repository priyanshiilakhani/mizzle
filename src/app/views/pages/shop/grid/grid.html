<section class="lg:pt-32 pt-20 md:pb-16 pb-6">
    <div class="container">
        <app-breadcrumb [title]="['Shop']" pageTitle="All product" />
        <h1 class="lg:text-4xl text-3xl mt-4">Search items</h1>
    </div>
</section>

<!-- Product content START -->
<section class="lg:pb-28 md:pb-20 pb-16">
    <div class="container">
        <div class="grid lg:grid-cols-4 gap-4 items-start">
            <div class="lg:col-span-1">
                <div id="offcanvasSidebar" class="hs-overlay [--auto-close:lg] lg:static lg:block! lg:translate-x-0 lg:end-auto lg:bottom-0 lg:w-full w-xs hs-overlay-open:translate-x-0 translate-x-full transition-all duration-300 transform h-full fixed top-0 end-0 bottom-0 z-60 bg-body-bg" role="dialog" tabindex="-1" aria-label="Sidebar">
                    <product-filter-sidebar />
                </div>
                <!-- End Sidebar -->
            </div>

            <div class="lg:col-span-3 lg:ps-14">
                <form class="flex md:flex-nowrap flex-wrap lg:justify-between items-center gap-3 mb-6">
                    <div class="rounded relative">
                        <input class="w-full py-2 ps-4 md:pe-10 pe-19 border-default-200 bg-default-100 rounded" type="search" placeholder="Search products by name or keyword..." aria-label="Search" />
                        <lucide-icon name="search" class="absolute inset-y-0 end-2 top-1/2 -translate-y-1/2 text-default-400 size-4"></lucide-icon>
                    </div>

                    <select class="md:w-auto w-full py-2 ps-4 pe-9 rounded bg-transparent border-default-200 text-default-700" aria-label="Default select example">
                        <option selected="">Sort by</option>
                        <option value="1">Name</option>
                        <option value="2">Low to High Price</option>
                        <option value="3">Heigh to Low Price</option>
                    </select>

                    <div class="lg:hidden flex items-center gap-2 text-start">
                        <button type="button" class="flex items-center gap-2 py-2 md:px-4 px-29.5 bg-dark hover:bg-dark-hover text-white rounded font-medium w-full" aria-haspopup="dialog" aria-expanded="false" aria-controls="offcanvasSidebar" aria-label="Toggle navigation" data-hs-overlay="#offcanvasSidebar">
                            <lucide-icon name="sliders-horizontal" class="size-4"></lucide-icon>
                            Show filter
                        </button>
                    </div>
                </form>

               <product-card/>

                <ul class="flex items-center justify-end mt-10 space-x-2">
                    <!-- Prev (Disabled) -->
                    <li>
                        <span class="px-4 py-3 text-sm bg-default-100 text-default-400 rounded" disabled>Prev</span>
                    </li>

                    <!-- Active Page -->
                    <li>
                        <a [routerLink]="[]" class="px-4 py-3 text-sm bg-primary text-white rounded">1</a>
                    </li>

                    <!-- Page -->
                    <li>
                        <a [routerLink]="[]" class="px-4 py-3 text-sm bg-default-100 hover:bg-primary hover:text-white text-default-600 transition-all rounded">2</a>
                    </li>

                    <li>
                        <span class="px-4 py-3 text-sm bg-default-100 hover:bg-primary hover:text-white text-default-600 transition-all rounded">..</span>
                    </li>

                    <li>
                        <a [routerLink]="[]" class="px-4 py-3 text-sm bg-default-100 hover:bg-primary hover:text-white text-default-600 transition-all rounded">22</a>
                    </li>

                    <!-- Next -->
                    <li>
                        <a [routerLink]="[]" class="px-4 py-3 text-sm bg-default-100 hover:bg-primary hover:text-white text-default-600 transition-all rounded">Next</a>
                    </li>
                </ul>
            </div>
        </div>
    </div>
</section>
