<div class="grid lg:grid-cols-3 md:grid-cols-2 grid-cols-1 gap-6">
    @for (item of shopItemData; track $index){
    @if (item.type === 'banner') {
    <div class="lg:col-span-3">
        <div class="h-full p-6 md:p-14 bg-cover bg-left bg-no-repeat rounded-md" style="background-image: url('{{item.bgImage}}')">
            <div class="lg:grid lg:grid-cols-12 flex flex-col lg:items-center lg:justify-between justify-start">
                <div class="lg:col-span-7 mb-4 lg:mb-0">
                    <h4 class="text-white md:text-3xl text-2xl font-bold">{{item.title}}</h4>
                </div>
                <div class="lg:col-span-5 lg:text-end text-start">
                    <a [routerLink]="item.link" class="inline-block bg-body-bg text-default-800 px-4 py-2 rounded-md font-medium hover:bg-default-200 transition-all">Shop now</a>
                </div>
            </div>
        </div>
    </div>
    } @else {
    <div class="relative bg-transparent border border-default-200 rounded-md overflow-hidden h-full group">
        <div class="absolute inset-x-0 top-0 flex items-start p-4 z-15">
            @if (item.label){
            <span class="{{item.labelClass}} text-xs px-2 py-1 rounded">{{item.label}}</span>
            }
            <button class="ms-auto bg-body-bg border border-default-200 rounded-full size-10 hover:bg-default-200 flex justify-center items-center transition-all">
                <lucide-icon name="heart" class="size-4.5 {{item.heartClass}}"></lucide-icon>
            </button>
        </div>

        <div class="bg-default-100 rounded p-5 m-2">
            <img src="{{item.image}}" class="w-full object-contain" />
        </div>

        <div class="pt-5 px-5">
            <h6 class="text-xl font-bold mb-2">
                <a routerLink="{{item.link}}" class="group-hover:text-primary transition-all duration-300 after:absolute after:inset-0">{{item.title}}</a>
            </h6>

            <ul class="flex items-center space-x-1 text-warning mb-4">
                @for (star of [1,2,3,4]; track $index) {
                <li>
                    <lucide-icon name="star" class="fill-warning size-4"></lucide-icon>
                </li>
                }
                <li>
                    <lucide-icon name="star-half" class="fill-warning size-4"></lucide-icon>
                </li>
            </ul>
        </div>

        <div class="pb-5 px-5 flex justify-between items-center">
            <div class="flex items-center gap-1">
                <p class="font-semibold text-primary">{{item.price}}</p>
                @if (item.oldPrice){
                <del class="text-default-600 text-sm">{{item.oldPrice}}</del>
                }
            </div>

            <button class="bg-dark hover:bg-dark-hover text-white py-3 px-4 rounded z-15 transition-all">
                <lucide-icon name="shopping-cart" class="size-4"></lucide-icon>
            </button>
        </div>
    </div>
    }
    }
</div>
