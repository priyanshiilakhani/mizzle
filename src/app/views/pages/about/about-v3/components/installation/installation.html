<section class="lg:py-28 md:py-20 py-16">
        <div class="container">
            <div class="grid lg:grid-cols-2 grid-cols-1 lg:gap-0 gap-y-10 items-center">
                <div>
                    <!-- Title -->
                    <h2 class="lg:mb-10 mb-4 lg:text-[45px] md:text-4xl text-3xl font-bold">Effortless Download and Installation of Mizzle</h2>
                    <p class="lg:mb-10 mb-4 text-default-600">Downloading mizzle is a quick and easy process. Follow these simple steps to start enjoying the benefits of our powerful software.</p>

                    <div class="flex flex-col gap-y-4">
                        <!-- Steps -->
                        <div class="flex items-center gap-4">
                            <div class="size-10.5 text-xs flex items-center justify-center bg-primary/10 text-primary font-bold rounded-full">01</div>
                            <h6 class="font-normal text-xl">Navigate to the 'Download' Page</h6>
                        </div>

                        <div class="flex items-center gap-4">
                            <div class="size-10.5 text-xs flex items-center justify-center bg-primary/10 text-primary font-bold rounded-full">02</div>
                            <h6 class="font-normal text-xl">Choose Your Plan</h6>
                        </div>

                        <div class="flex items-center gap-4">
                            <div class="size-10.5 text-xs flex items-center justify-center bg-primary/10 text-primary font-bold rounded-full">03</div>
                            <h6 class="font-normal text-xl">Create an Account</h6>
                        </div>

                        <div class="flex items-center gap-4">
                            <div class="size-10.5 text-xs flex items-center justify-center bg-primary/10 text-primary font-bold rounded-full">04</div>
                            <h6 class="font-normal text-xl">Sign In and Start Using</h6>
                        </div>
                    </div>

                    <!-- Download Buttons -->
                    <div class="flex items-center gap-2 mt-10">
                        <a [routerLink]="[]">
                            <img src="assets/images/elements/google-play.svg" class="hover:-translate-y-1 transition-all h-12" alt="google-store" />
                        </a>

                        <a [routerLink]="[]">
                            <img src="assets/images/elements/app-store.svg" class="hover:-translate-y-1 transition-all h-12" alt="app-store" />
                        </a>
                    </div>
                </div>

                <!-- Right -->
                <div class="relative lg:ms-auto">
                    <!-- Rotated Text -->
                    <div class="absolute top-1/2 -start-6.5 -translate-y-1/2 -translate-x-1/2">
                        <h2 class="text-7xl text-default-400 opacity-20 uppercase rotate-270">since 2018</h2>
                    </div>

                    <!-- Image -->
                    <img src="assets/images/about/14.jpg" class="rounded-md relative lg:w-lg" />
                </div>
            </div>
        </div>
    </section>
