<section class="lg:py-14">
  <div
    class="container py-20 lg:py-32 bg-[url('/images/elements/map.svg')] bg-no-repeat bg-center bg-contain"
  >
    <div class="max-w-3xl mx-auto text-center">
      <!-- Title -->
      <h2 class="lg:text-[45px] md:text-4xl text-3xl font-semibold mb-6">
        We're global and growing
      </h2>
      <p class="mb-14 text-default-600">
        Mizzle customer support is available free of charge. Connection charges can vary when
        calling from outside the area, abroad or from a mobile phone.
      </p>

      <div class="grid md:grid-cols-2 grid-cols-1 gap-6 justify-center text-start">
        @for( item of locationData; track $index ){
           <div class="border border-default-200 rounded-md p-6 bg-body-bg">
          <!-- Avatar -->
          <div class="size-16 mb-6">
            <img
              [src]="item.image"
              alt="flag"
              class="size-full rounded-full object-cover"
            />
          </div>

          <h6 class="text-xl font-semibold mb-4">
            <a [routerLink]="[]" class="hover:text-primary duration-300">{{item.name}}</a>
          </h6>

          <!-- List -->
          <ul class="space-y-4">
            <li class="flex items-start gap-2">
              <lucide-icon name="map-pin" class="size-5.5 mt-0.5"></lucide-icon>
              {{item.location}}
            </li>

            <li class="flex items-start gap-2">
              <lucide-icon name="headset" class="size-4 mt-1"></lucide-icon>
              Call: {{item.contact}} (Toll-free)
            </li>
          </ul>
        </div>
        }
      </div>
    </div>
  </div>
</section>
