<section class="lg:py-28 md:py-20 py-16">
    <div class="container">
        <div class="grid lg:grid-cols-4 md:grid-cols-3 grid-cols-1 md:gap-14 gap-8">
            <!-- Team Item -->
             @for(item of gridData; track $index) {
            <div class="relative overflow-hidden bg-transparent group">
                <!-- Social Icons -->
                <div class="absolute top-3 end-3 z-20 space-y-2 flex items-center gap-2.5">
                    @for(social of item.socials; track $index) {
                    <a [routerLink]="[]"
                        class="size-8 flex items-center justify-center rounded  text-white text-sm" [class]="social.bgClass">
                        <lucide-icon [name]="social.icon" class="size-3"></lucide-icon>
                    </a>
                }
                </div>

                <!-- Image Wrapper -->
                <div class="rounded-md overflow-hidden">
                    <img [src]="item.image"
                        class="w-full h-auto transform transition-transform duration-500 group-hover:scale-104" />
                </div>

                <!-- Body -->
                <div class="text-center pt-5">
                    <h6 class="mb-0">
                        <a [routerLink]="[]"
                            class="after:absolute after:inset-0 relative text-xl duration-500 group-hover:text-primary">{{item.name}}</a>
                    </h6>
                    <small class="text-sm">{{item.role}}</small>
                </div>
            </div>
          }
        </div>
    </div>
</section>
