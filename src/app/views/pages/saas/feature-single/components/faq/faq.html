<section class="lg:py-28 md:py-20 py-16">
    <div class="container">
        <div class="grid md:grid-cols-12 grid-cols-1">
            <div class="md:col-span-5">
                <h2 class="lg:text-[45px] md:text-4xl text-3xl mb-10">You have questions we have answers</h2>
            </div>

            <div class="md:col-span-7">
                <div class="hs-accordion-group">
                    @for (faq of faqData; track $index; let i = $index) {
                    <div class="hs-accordion mb-4" [class.active]="i === 0" [id]="'heading-' + i">
                        <button class="hs-accordion-toggle inline-flex justify-between items-center gap-x-3 w-full rounded font-semibold text-start bg-default-100 text-default-800 py-4 ps-5 pe-8" aria-expanded="false" [attr.aria-controls]="'collapse-' + i">
                            {{ faq.question }}
                            <lucide-icon name="plus" class="hs-accordion-active:hidden block size-4 text-default-800"></lucide-icon>
                            <lucide-icon name="minus" class="hs-accordion-active:block hidden size-4 text-default-800"></lucide-icon>
                        </button>

                        <div class="hs-accordion-content w-full overflow-hidden transition-[height] duration-300" [class.hidden]="i !== 0" role="region" [id]="'collapse-' + i" [attr.aria-labelledby]="'heading-' + i">
                            <div class="mt-4.5 px-4">
                                <p class="text-default-700">
                                    {{ faq.answer }}
                                </p>
                            </div>
                        </div>
                    </div>
                    }
                </div>
            </div>
        </div>
    </div>
</section>
