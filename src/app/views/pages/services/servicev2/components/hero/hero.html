<section class="lg:pt-44 md:pt-28 pt-24">
        <div class="container relative">
            <div class="grid lg:grid-cols-2 md:grid-cols-12 grid-cols-1 items-center md:gap-7.5 gap-y-16">
                <!-- Left Content -->
                <div class="lg:col-span-1 md:col-span-7">
                    <!-- Title -->
                    <h1 class="lg:text-[58px] md:text-[45px] text-4xl font-bold mb-6">Discover the solutions we offer</h1>
                    <p class="text-default-600 mb-6">Our experienced team is dedicated to helping you achieve your goals through innovative technology.</p>

                    <!-- Button -->
                    <a routerLink="/contact/v1" class="inline-flex items-center gap-2 text-white bg-dark hover:bg-dark-hover px-6 py-3 rounded mb-10">
                        <lucide-icon name="phone" class="size-4"></lucide-icon>
                        Contact us
                    </a>

                    <!-- Rating Section -->
                    <div class="flex flex-col md:flex-row md:items-center">
                        <ul class="flex items-center -space-x-4 mb-3 md:mb-0">
                            <li class="size-16 rounded-full overflow-hidden">
                                <img src="/images/avatar/08.jpg" class="size-full object-cover" alt="avatar" />
                            </li>

                            <li class="size-16 rounded-full overflow-hidden">
                                <img src="/images/avatar/12.jpg" class="size-full object-cover" alt="avatar" />
                            </li>

                            <li class="size-16 rounded-full bg-primary flex items-center justify-center text-white font-semibold">10K+</li>
                        </ul>

                        <!-- Info -->
                        <div class="md:ms-4 mt-2 md:mt-0">
                            <p class="text-default-900 font-normal mb-1">More than 10k active users! 🤩</p>
                            <a [routerLink]="[]" class="inline-flex items-center gap-2 group text-default-600 hover:text-primary">
                                Join them now
                                <lucide-icon name="move-right" class="size-4 group-hover:translate-x-1 transition-all duration-300"></lucide-icon>
                            </a>
                        </div>
                    </div>
                </div>

                <!-- Right Image -->
                <div class="lg:col-span-1 md:col-span-5 lg:ms-20">
                    <img src="/images/elements/service.svg" class="w-full" />
                </div>
            </div>
        </div>
    </section>
