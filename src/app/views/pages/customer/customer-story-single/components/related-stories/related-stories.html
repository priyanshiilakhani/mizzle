<section class="lg:pb-28 md:pb-20 pb-16">
  <div class="container">
    <div class="text-center mb-10">
      <h2 class="lg:text-[45px] md:text-4xl text-3xl font-semibold">Related stories</h2>
    </div>

    <div class="lg:w-2/3 lg:mx-auto">
      <div class="grid md:grid-cols-2 grid-cols-1 gap-7.5">
        @for (item of storiesData; track $index) {
          <div class="bg-transparent overflow-hidden group relative">
            <div class="overflow-hidden rounded-md mb-4">
              <img [src]="item.image" class="w-full" alt="story-image" />
            </div>

            <div class="my-5 space-y-3">
              <img [src]="item.client.image" class="h-8" />
              <h6 class="font-semibold mb-4 text-xl">{{ item.title }}</h6>

              <a
                routerLink="/customer/story-single"
                class="group-hover:text-primary-hover transition-all inline-flex items-center gap-2 text-primary font-medium after:absolute after:inset-0"
              >
                Read full story
                <lucide-icon
                  name="move-right"
                  class="size-4 group-hover:translate-x-1 transition-all duration-300">
                </lucide-icon>
              </a>
            </div>
          </div>
        }
      </div>
    </div>
  </div>
</section>
