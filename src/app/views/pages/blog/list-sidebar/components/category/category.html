<div class="container">
    <div class="lg:w-4xl md:w-2xl mx-auto text-center mb-14">
        <h1 class="mb-0 leading-normal relative lg:text-[58px] md:text-[45px] text-4xl font-bold">
            <!-- SVG decoration -->
            <span class="absolute -top-10 -start-10 hidden sm:block">
                <svg class="fill-primary" width="63.6px" height="93.3px" viewBox="0 0 63.6 93.3">
                    <path d="M58.5,1.9c0.5,0,1.6,5.3,2.4,11.8c0.8,6.5,1.4,14,1.6,18.5c0.3,8.8-0.5,15.9-1.6,16c-1.1,0-2.1-7.1-2.4-15.8 c-0.2-4.4-0.3-12-0.4-18.4C57.9,7.3,57.9,1.9,58.5,1.9z"></path>
                    <path d="M47.7,44.4c-0.5,0.1-1.5-2.1-2.8-4.7c-1.3-2.6-2.8-5.5-3.7-7.2c-1.7-3.4-2.9-6.4-2.1-7c0.8-0.6,3.4,1.5,5.3,5.1 c1,1.8,2.2,5.1,2.9,8.1C48.1,41.8,48.2,44.3,47.7,44.4z"></path>
                    <path d="M36.2,53.4c-0.2,0.5-4.1-1.2-8.5-3.5c-4.4-2.3-9.5-5.4-12.3-7.3c-5.6-3.9-9.6-7.9-9-8.8c0.6-0.9,5.4,1.7,11,5.5 c2.8,1.9,7.5,5.3,11.6,8.2C33.1,50.5,36.4,53,36.2,53.4z"></path>
                    <path d="M27.2,68.3c-0.1,0.5-2.1,0.7-4.4,0.6c-2.4,0-5.1-0.3-6.7-0.7c-3.1-0.6-5.4-2-5.2-3c0.2-1,2.9-1.2,5.9-0.5 c1.5,0.3,4.1,1,6.3,1.7C25.4,67.1,27.2,67.8,27.2,68.3z"></path>
                    <path d="M30.8,83.2c0.1,0.5-3.5,1.7-7.7,3.1c-4.3,1.4-9.2,3.1-12.1,4.1c-5.7,1.9-10.6,3.1-11,2.1 c-0.4-0.9,3.9-3.6,9.8-5.6c2.9-1,8.1-2.4,12.6-3.2C26.9,83,30.7,82.7,30.8,83.2z"></path>
                </svg>
            </span>
            Thoughts, stories and ideas from Mizzle
        </h1>

        <form class="w-full md:w-7/12 border border-default-200 bg-default-100! rounded relative mx-auto p-2 lg:mt-5 md:mt-10 mt-6">
            <div class="flex">
                <input type="email" placeholder="Search blog" class="bg-default-100! grow border-0 focus:ring-0 focus:outline-none px-3 text-default-700" />
                <button type="button" class="bg-dark text-white rounded px-4 py-2 flex items-center gap-2 whitespace-nowrap absolute end-2">
                    <lucide-icon name="search" class="size-4"></lucide-icon>
                    Search
                </button>
            </div>
        </form>
    </div>

    <h6 class="mb-6 text-xl">Blog category</h6>

    <div class="swiper">
        <swiper-container class="swiper-wrapper mb-12" space-between="20" pagination="true" pagination-el=".swiper-pagination" pagination-clickable="true" slides-per-view="2" [breakpoints]='{
            "576": { "slidesPerView": 3 },
            "992": { "slidesPerView": 5 },
        }'>
            <!-- Item -->
            @for(item of categorySlideData;track $index){
            <div class="swiper-slide">
                <a [routerLink]="[]" class="block relative overflow-hidden rounded-lg">
                    <img [src]="item.image" alt="category-img" class="size-full object-cover transform hover:scale-106 transition duration-500" />
                    <div class="absolute top-2 start-2 p-4">
                        <span class="bg-black text-white text-xs px-2 py-1 rounded">{{item.title}}</span>
                    </div>
                </a>
            </div>
            }
        </swiper-container>

        <!-- Pagination -->
        <div class="swiper-pagination swiper-pagination-primary"></div>
    </div>
</div>
