<section class="lg:py-32 md:py-22 py-16">
    <div class="container">
        <div class="grid lg:grid-cols-3 grid-cols-1 lg:gap-14 gap-6">
            @for (item of supportLinkData; track $index) {

            <div
                class="p-6 border border-default-200 rounded-md group hover:shadow-xl hover:-translate-y-1 duration-300 transition-all">

                <div class="flex justify-between items-center gap-4">

                    <div class="flex items-start gap-4">

                        <h4>
                            <lucide-icon [name]="item.icon" class="size-8 text-primary"></lucide-icon>
                        </h4>

                        <div>
                            <h6 class="text-xl font-bold">
                                {{ item.title }}
                            </h6>

                            
                            @if (!item.email) {
                            <small class="text-sm">
                                {{ item.description }}
                            </small>
                            }

                            
                            @if (item.email) {
                            <span class="text-sm">
                                {{ item.description }}
                                <a [routerLink]="[]" class="text-default-900">
                                    {{ item.email }}
                                </a>
                            </span>
                            }

                        </div>

                    </div>

                    <a [routerLink]="[]">
                        <lucide-icon name="move-right"
                            class="size-6 text-default-600 group-hover:translate-x-1.5 duration-300 transition-all"></lucide-icon>
                    </a>

                </div>

            </div>

            }

        </div>
    </div>
</section>
