<section class="lg:pb-28 pb-20">
    <div class="container">
        <div class="lg:mb-14 mb-6 text-center">
            <h2 class="mb-2 lg:text-[45px] md:text-4xl text-3xl">Follow our work</h2>
            <p class="lg:w-3xl mx-auto">The combination of my passion for design, code & interaction positions me in a unique place in the web design world.</p>
        </div>

        <div class="grid lg:grid-cols-3 grid-cols-1 gap-6">
            @for (item of templateItems; track $index) {
            <div class="relative bg-default-100 border border-default-200 rounded-md p-5 group">
                <a [routerLink]="[]" class="absolute inset-0 z-0" [attr.aria-label]="item.ariaLabel"></a>

                <div class="flex items-center gap-6">
                    <div class="flex gap-4">
                        <img [src]="item.image" [class]="item.imageHeight" />
                        <div>
                            <h6 class="text-xl">{{ item.title }}</h6>
                            <small>{{ item.description }}</small>
                        </div>
                    </div>

                    <span class="group-hover:translate-x-1 transition-all duration-300 group-hover:text-primary">
                        <lucide-icon name="move-right" class="size-6"></lucide-icon>
                    </span>
                </div>
            </div>
            }
        </div>
    </div>
</section>
