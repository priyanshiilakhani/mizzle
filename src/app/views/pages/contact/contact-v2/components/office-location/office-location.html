<section class="relative bg-cover bg-center bg-no-repeat bg-fixed lg:py-30 py-20" style='background-image: url("/images/bg/03.jpg")'>
    <div class="container">
        <div class="lg:w-2/3 flex md:flex-nowrap flex-wrap ms-auto md:gap-14 gap-6">
            @for(item of locationData;track $index){
            <div class="border border-default-200 rounded-md p-6 bg-body-bg">
                <!-- Avatar -->
                <div class="size-16 mb-6">
                    <img [src]="item.image" alt="flag" class="size-full rounded-full object-cover" />
                </div>

                <h6 class="text-xl font-semibold mb-4">
                    <a [routerLink]="[]" class="hover:text-primary duration-300">{{item.country}}</a>
                </h6>

                <!-- List -->
                <ul class="space-y-4">
                    <li class="flex items-start gap-2">
                        <lucide-icon name="map-pin" class="size-4.5 mt-0.5"></lucide-icon>
                        {{item.address}}
                    </li>

                    <li class="flex items-start gap-2">
                        <lucide-icon name="headset" class="size-4 mt-0.5"></lucide-icon>
                        Call: {{item.phone}}
                    </li>
                </ul>
            </div>
            }
        </div>
    </div>
</section>
